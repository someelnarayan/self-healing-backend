targets:
  - name: bookshop
    health_url: http://bookshop:8080/health
    log_path: /var/log/bookshop/app.log
    container_name: bookshop
    poll_interval_seconds: 10

thresholds:
  cpu_percent: 85.0
  ram_percent: 80.0
  response_time_ms: 3000
  error_rate_per_window: 5

  # Reduced for testing.
  # Original value was 5.
  sliding_window_size: 5

rules:
  - anomaly_type: MEMORY_LEAK
    actions:
      - restart_service
      - send_alert
    cooldown_minutes: 5

  - anomaly_type: HIGH_CPU
    actions:
      - send_alert
      - restart_service
    cooldown_minutes: 10

  - anomaly_type: HEALTH_CHECK_FAIL
    actions:
      - restart_service
      - send_alert
    cooldown_minutes: 3

  - anomaly_type: HIGH_ERROR_RATE
    actions:
      - send_alert
      - retry_http_endpoint
    cooldown_minutes: 5

  - anomaly_type: SLOW_RESPONSE
    actions:
      - send_alert
    cooldown_minutes: 10

alerting:
  slack_webhook_url: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""
  alert_email_to: "ops@example.com"

knowledge_db_path: knowledge.db