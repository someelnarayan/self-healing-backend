targets:
  - id: bookshop
    name: bookshop
    type: local
    health_url: http://bookshop:8080
    log_path: /var/log/bookshop/app.log
    container_name: bookshop
    poll_interval_seconds: 10
    metadata:
      service_kind: app

  - id: ssh-test
    name: ssh-test
    type: ssh
    host: 172.29.69.164
    username: hpsomeel
    ssh_key: /root/.ssh/id_rsa
    poll_interval_seconds: 10

    # ---- SSH demo target operational fields ----
    process_name: dummy_service.py
    restart_command: bash /home/hpsomeel/healer_demo_lab/restart_dummy.sh
    cleanup_command: bash /home/hpsomeel/healer_demo_lab/cleanup_demo.sh
    kill_command: bash /home/hpsomeel/healer_demo_lab/kill_dummy.sh
    log_path: /home/hpsomeel/healer_demo_lab/logs/dummy.log
    tmp_dir: /home/hpsomeel/healer_demo_lab/tmp
    demo_base_dir: /home/hpsomeel/healer_demo_lab

    metadata:
      service_kind: ssh_target

  - id: prom-local
    name: prom-local
    type: prometheus
    prometheus_url: http://prometheus:9090
    poll_interval_seconds: 10
    metadata:
      service_kind: metrics_source


thresholds:
  cpu_percent: 85.0
  ram_percent: 80.0
  response_time_ms: 3000
  error_rate_per_window: 5
  sliding_window_size: 5


rules:
  - anomaly_type: MEMORY_LEAK
    actions:
      - restart_service
      - send_alert
    cooldown_minutes: 2
    enabled: true

  - anomaly_type: HIGH_CPU
    actions:
      - send_alert
      - cleanup_demo
    cooldown_minutes: 10
    enabled: true

  - anomaly_type: HEALTH_CHECK_FAIL
    actions:
      - restart_service
      - send_alert
    cooldown_minutes: 3
    enabled: true

  - anomaly_type: HIGH_ERROR_RATE
    actions:
      - send_alert
      - retry_http_endpoint
    cooldown_minutes: 5
    enabled: true

  - anomaly_type: SLOW_RESPONSE
    actions:
      - send_alert
    cooldown_minutes: 10
    enabled: true

  - anomaly_type: HIGH_RAM
    actions:
      - send_alert
      - cleanup_demo
    cooldown_minutes: 10
    enabled: true

  - anomaly_type: PROCESS_DOWN
    actions:
      - restart_process
      - send_alert
    cooldown_minutes: 2
    enabled: true


alerting:
  slack_webhook_url: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""
  alert_email_to: "ops@example.com"


knowledge_db_path: knowledge.db